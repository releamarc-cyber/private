<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>◈ Portfolio Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0d0f14; color: white; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    input, select, button { font-family: inherit; }
    input::placeholder { color: rgba(255,255,255,0.25); }

    /* ── Gate overlay ── */
    #gate {
      position: fixed; inset: 0; background: #0d0f14;
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; flex-direction: column; gap: 0;
    }
    #gate-card {
      background: #111318; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 36px 32px; width: 340px;
    }
    #gate-logo { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 8px; }
    #gate-sub { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 28px; }
    #gate-input {
      width: 100%; background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12); border-radius: 8px;
      padding: 11px 14px; color: white; font-size: 14px;
      outline: none; font-family: inherit; letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    #gate-input:focus { border-color: rgba(255,255,255,0.3); }
    #gate-btn {
      width: 100%; background: white; color: #0d0f14; border: none;
      border-radius: 8px; padding: 12px 0; font-size: 13px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    #gate-btn:hover { opacity: 0.88; }
    #gate-err {
      font-size: 12px; color: #f87171; margin-top: 10px;
      min-height: 18px; text-align: center;
    }
    #gate-hint {
      font-size: 11px; color: rgba(255,255,255,0.2);
      margin-top: 20px; text-align: center; line-height: 1.6;
    }
    #gate.hidden { display: none; }
  </style>

  <!-- ── Password gate (runs before React) ── -->
  <script>
    // ─────────────────────────────────────────────
    // CAMBIA ESTA CONTRASEÑA POR LA QUE QUIERAS
    const SITE_PASSWORD = "mipassword123";
    // ─────────────────────────────────────────────

    // Hash SHA-256 de la contraseña para no guardarla en claro en localStorage
    async function sha256(msg) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }

    const STORAGE_KEY = "pt_auth";
    let correctHash = "";

    async function init() {
      correctHash = await sha256(SITE_PASSWORD);
      const stored = sessionStorage.getItem(STORAGE_KEY);
      if (stored === correctHash) unlock();
    }

    function unlock() {
      document.getElementById("gate").classList.add("hidden");
    }

    async function tryPassword() {
      const val = document.getElementById("gate-input").value;
      const h = await sha256(val);
      if (h === correctHash) {
        sessionStorage.setItem(STORAGE_KEY, h);
        unlock();
      } else {
        const err = document.getElementById("gate-err");
        err.textContent = "Contraseña incorrecta";
        document.getElementById("gate-input").value = "";
        document.getElementById("gate-input").focus();
        setTimeout(()=> err.textContent = "", 2500);
      }
    }

    window.addEventListener("DOMContentLoaded", init);
  </script>
</head>
<body>
  <!-- Gate overlay -->
  <div id="gate">
    <div id="gate-card">
      <div id="gate-logo">◈ Portfolio Tracker</div>
      <div id="gate-sub">Introduce la contraseña para continuar</div>
      <input id="gate-input" type="password" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter') tryPassword()" />
      <button id="gate-btn" onclick="tryPassword()">Acceder →</button>
      <div id="gate-err"></div>
      <div id="gate-hint">La sesión se mantiene mientras el navegador esté abierto.</div>
    </div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    const BASE_URL = "https://api.alpaca.markets";
    const WEEKLY_ETFS = new Set(["QDTE","XDTE","RDTE","SPDT","IWMY","FEPI","BALI","QQQI","SPYI"]);
    const MONTHLY_ETFS = new Set(["JEPI","JEPQ","XYLD","QYLD","RYLD","DIVO","GPIQ","SVOL","KLIP","YMAX","YMAG","CONY","MSFO","NVDY","TSLY","AMZY","GOOGY","NFLY","APLY"]);
    const YIELDS = {
      QDTE:0.52,XDTE:0.48,RDTE:0.44,SPDT:0.38,IWMY:0.50,FEPI:0.32,BALI:0.30,QQQI:0.40,SPYI:0.12,
      JEPI:0.077,JEPQ:0.095,XYLD:0.12,QYLD:0.13,RYLD:0.12,DIVO:0.045,GPIQ:0.14,
      SVOL:0.18,KLIP:0.65,YMAX:0.52,YMAG:0.48,CONY:0.70,MSFO:0.55,NVDY:0.60,
      TSLY:0.65,AMZY:0.42,GOOGY:0.40,NFLY:0.45,APLY:0.38
    };
    const NAV_ITEMS = [
      { id:"dashboard", label:"Dashboard", icon:"◈" },
      { id:"positions", label:"Posiciones", icon:"⊞" },
      { id:"ltv", label:"LTV & Margen", icon:"⊿" },
      { id:"dividends", label:"Dividendos", icon:"◎" },
      { id:"chart", label:"Evolución", icon:"↗" },
    ];

    const fmt = (v, dec=2) => {
      if (v==null||isNaN(v)) return "—";
      const n=Number(v);
      return (n<0?"-$":"$")+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec});
    };
    const fmtPct = (v,dec=2) => {
      if (v==null||isNaN(v)) return "—";
      return (v>=0?"+":"")+Number(v).toFixed(dec)+"%";
    };
    const fmtK = (v) => {
      if (v==null||isNaN(v)) return "—";
      const n=Number(v);
      if (Math.abs(n)>=1e6) return (n<0?"-$":"$")+(Math.abs(n)/1e6).toFixed(2)+"M";
      if (Math.abs(n)>=1e3) return (n<0?"-$":"$")+(Math.abs(n)/1e3).toFixed(1)+"K";
      return fmt(v,0);
    };
    const getType = (sym) => {
      if (WEEKLY_ETFS.has(sym?.toUpperCase())) return "weekly";
      if (MONTHLY_ETFS.has(sym?.toUpperCase())) return "monthly";
      return "other";
    };
    const getYield = (sym) => YIELDS[sym?.toUpperCase()] || 0.08;

    // ── LTV Gauge ──
    function LTVGauge({ ltv }) {
      const clamped = Math.min(Math.max(ltv,0),100);
      const angle = -135 + (clamped/100)*270;
      const color = ltv<40?"#4ade80":ltv<60?"#fbbf24":"#f87171";
      const cx=80,cy=80,r=60;
      const toXY = (deg) => { const rad=deg*Math.PI/180; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}; };
      const arc = (s,e,col) => {
        const sp=toXY(s),ep=toXY(e);
        const large=Math.abs(e-s)>180?1:0;
        return <path d={`M ${sp.x} ${sp.y} A ${r} ${r} 0 ${large} 1 ${ep.x} ${ep.y}`} fill="none" stroke={col} strokeWidth="10" strokeLinecap="round"/>;
      };
      const needle=toXY(angle);
      return (
        <svg viewBox="0 0 160 110" style={{width:"100%",maxWidth:200}}>
          {arc(-135,-9,"rgba(255,255,255,0.08)")}
          {arc(-135,-135+(clamped/100)*270,color)}
          <line x1={cx} y1={cy} x2={needle.x} y2={needle.y} stroke={color} strokeWidth="2.5" strokeLinecap="round"/>
          <circle cx={cx} cy={cy} r="5" fill={color}/>
          <text x={cx} y={cy+28} textAnchor="middle" fill="white" fontSize="18" fontWeight="600">{clamped.toFixed(1)}%</text>
          <text x={cx} y={cy+42} textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="9">LTV</text>
          <text x={20} y={105} fill="rgba(255,255,255,0.3)" fontSize="8">0%</text>
          <text x={130} y={105} fill="rgba(255,255,255,0.3)" fontSize="8">100%</text>
        </svg>
      );
    }

    // ── Line Chart (Canvas) ──
    function LineChart({ data, labels, color="#60a5fa" }) {
      const ref = useRef(null);
      useEffect(() => {
        if (!data?.length||!ref.current) return;
        const canvas=ref.current;
        const ctx=canvas.getContext("2d");
        const dpr=window.devicePixelRatio||1;
        const w=canvas.offsetWidth,h=canvas.offsetHeight;
        canvas.width=w*dpr; canvas.height=h*dpr;
        ctx.scale(dpr,dpr);
        ctx.clearRect(0,0,w,h);
        const pad={t:20,r:20,b:40,l:72};
        const cw=w-pad.l-pad.r, ch=h-pad.t-pad.b;
        const min=Math.min(...data)*0.995, max=Math.max(...data)*1.005;
        const xS=(i)=>pad.l+(i/(data.length-1))*cw;
        const yS=(v)=>pad.t+ch-((v-min)/(max-min))*ch;
        ctx.strokeStyle="rgba(255,255,255,0.05)"; ctx.lineWidth=1;
        for (let i=0;i<=4;i++) {
          const y=pad.t+(ch/4)*i;
          ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+cw,y); ctx.stroke();
          const val=max-((max-min)/4)*i;
          ctx.fillStyle="rgba(255,255,255,0.35)"; ctx.font="11px 'DM Sans',system-ui"; ctx.textAlign="right";
          ctx.fillText(fmtK(val),pad.l-8,y+4);
        }
        const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ch);
        grad.addColorStop(0,color+"33"); grad.addColorStop(1,color+"00");
        ctx.beginPath(); ctx.moveTo(xS(0),yS(data[0]));
        data.forEach((v,i)=>ctx.lineTo(xS(i),yS(v)));
        ctx.lineTo(xS(data.length-1),pad.t+ch); ctx.lineTo(xS(0),pad.t+ch);
        ctx.closePath(); ctx.fillStyle=grad; ctx.fill();
        ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin="round";
        data.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v)));
        ctx.stroke();
        ctx.fillStyle="rgba(255,255,255,0.35)"; ctx.font="10px 'DM Sans',system-ui"; ctx.textAlign="center";
        const step=Math.ceil(labels.length/8);
        labels.forEach((l,i)=>{ if(i%step===0) ctx.fillText(l,xS(i),h-12); });
      },[data,labels,color]);
      return <canvas ref={ref} style={{width:"100%",height:"100%",display:"block"}}/>;
    }

    // ── Dividend Calendar ──
    function DividendCalendar({ positions }) {
      const today=new Date();
      const [viewMonth,setViewMonth]=useState(today.getMonth());
      const [viewYear,setViewYear]=useState(today.getFullYear());
      const events={};
      positions.forEach(p=>{
        const t=getType(p.symbol), mv=parseFloat(p.market_value), yld=getYield(p.symbol);
        if (t==="weekly") {
          const d=new Date(viewYear,viewMonth,1);
          while (d.getMonth()===viewMonth) {
            if (d.getDay()===5) {
              const key=d.getDate();
              if(!events[key]) events[key]=[];
              events[key].push({sym:p.symbol,amt:mv*yld/52,type:"weekly"});
            }
            d.setDate(d.getDate()+1);
          }
        } else {
          const key=3;
          if(!events[key]) events[key]=[];
          events[key].push({sym:p.symbol,amt:mv*yld/12,type:"monthly"});
        }
      });
      const firstDay=new Date(viewYear,viewMonth,1).getDay();
      const daysInMonth=new Date(viewYear,viewMonth+1,0).getDate();
      const monthName=new Date(viewYear,viewMonth).toLocaleString("es-ES",{month:"long",year:"numeric"});
      const cells=[];
      for(let i=0;i<firstDay;i++) cells.push(null);
      for(let i=1;i<=daysInMonth;i++) cells.push(i);
      const prev=()=>{ if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1); };
      const next=()=>{ if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1); };
      const btnS={background:"rgba(255,255,255,0.07)",border:"none",color:"white",borderRadius:6,padding:"4px 14px",cursor:"pointer",fontSize:18};
      return (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <button onClick={prev} style={btnS}>‹</button>
            <span style={{fontWeight:600,fontSize:14,textTransform:"capitalize"}}>{monthName}</span>
            <button onClick={next} style={btnS}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
            {["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"].map(d=>(
              <div key={d} style={{textAlign:"center",fontSize:9,color:"rgba(255,255,255,0.3)",padding:"3px 0"}}>{d}</div>
            ))}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {cells.map((day,i)=>{
              if(!day) return <div key={i}/>;
              const evs=events[day]||[];
              const isToday=day===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear();
              const total=evs.reduce((s,e)=>s+e.amt,0);
              return (
                <div key={i} style={{minHeight:50,borderRadius:5,padding:"3px 4px",background:isToday?"rgba(96,165,250,0.15)":evs.length?"rgba(74,222,128,0.07)":"rgba(255,255,255,0.03)",border:isToday?"1px solid rgba(96,165,250,0.4)":"1px solid transparent"}}>
                  <div style={{fontSize:10,color:isToday?"#60a5fa":"rgba(255,255,255,0.5)",fontWeight:isToday?600:400}}>{day}</div>
                  {evs.length>0&&(
                    <div style={{marginTop:1}}>
                      {evs.slice(0,2).map((e,j)=>(
                        <div key={j} style={{fontSize:8,color:e.type==="weekly"?"#60a5fa":"#4ade80",lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.sym}</div>
                      ))}
                      {total>0&&<div style={{fontSize:8,color:"rgba(255,255,255,0.35)",marginTop:1}}>{fmt(total,0)}</div>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:16,marginTop:10}}>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"rgba(255,255,255,0.4)"}}>
              <div style={{width:8,height:8,borderRadius:2,background:"#60a5fa"}}/> Semanal
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"rgba(255,255,255,0.4)"}}>
              <div style={{width:8,height:8,borderRadius:2,background:"#4ade80"}}/> Mensual
            </div>
          </div>
        </div>
      );
    }

    // ── App Principal ──
    function App() {
      const [creds,setCreds]=useState(()=>{ try{return JSON.parse(localStorage.getItem("alpaca_creds")||"{}");}catch{return{};} });
      const [inputKey,setInputKey]=useState(creds.key||"");
      const [inputSecret,setInputSecret]=useState(creds.secret||"");
      const [connected,setConnected]=useState(false);
      const [loading,setLoading]=useState(false);
      const [error,setError]=useState(null);
      const [account,setAccount]=useState(null);
      const [positions,setPositions]=useState([]);
      const [history,setHistory]=useState(null);
      const [activeNav,setActiveNav]=useState("dashboard");
      const [sortBy,setSortBy]=useState("market_value");
      const [filterType,setFilterType]=useState("all");
      const [lastRefresh,setLastRefresh]=useState(null);

      const apiFetch=useCallback(async(path)=>{
        const res=await fetch(`${BASE_URL}${path}`,{headers:{"APCA-API-KEY-ID":creds.key,"APCA-API-SECRET-KEY":creds.secret}});
        if(!res.ok) throw new Error(`${res.status} — ${res.statusText}`);
        return res.json();
      },[creds]);

      const loadData=useCallback(async()=>{
        if(!creds.key||!creds.secret) return;
        setLoading(true); setError(null);
        try {
          const [acc,pos,hist]=await Promise.all([
            apiFetch("/v2/account"),
            apiFetch("/v2/positions"),
            apiFetch("/v2/account/portfolio/history?period=1M&timeframe=1D"),
          ]);
          if(acc.code) throw new Error(acc.message||"Error de autenticación");
          setAccount(acc);
          setPositions(Array.isArray(pos)?pos:[]);
          setHistory(hist);
          setConnected(true);
          setLastRefresh(new Date());
        } catch(e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      },[apiFetch,creds]);

      useEffect(()=>{ if(creds.key&&creds.secret) loadData(); },[]);
      const connect=()=>{ const c={key:inputKey.trim(),secret:inputSecret.trim()}; setCreds(c); localStorage.setItem("alpaca_creds",JSON.stringify(c)); };
      useEffect(()=>{ if(creds.key&&creds.secret) loadData(); },[creds]);

      const pv=parseFloat(account?.portfolio_value||0);
      const eq=parseFloat(account?.equity||0);
      const marginUsed=pv-eq;
      const ltv=pv>0?(marginUsed/pv)*100:0;
      const bp=parseFloat(account?.buying_power||0);
      const totalPL=positions.reduce((s,p)=>s+parseFloat(p.unrealized_pl||0),0);
      const totalDivMonth=positions.reduce((s,p)=>s+parseFloat(p.market_value)*getYield(p.symbol)/12,0);
      const totalDivYear=totalDivMonth*12;
      const portYield=pv>0?(totalDivYear/pv)*100:0;
      const mcDrop=pv>0&&eq>0?((eq-pv*0.25)/pv)*100:0;
      const ltvColor=ltv<40?"#4ade80":ltv<60?"#fbbf24":"#f87171";
      const histLabels=history?.timestamp?.map(t=>new Date(t*1000).toLocaleDateString("es-ES",{day:"2-digit",month:"short"}))||[];
      const histData=history?.equity?.map(v=>parseFloat(v))||[];
      const filteredPos=positions.filter(p=>filterType==="all"||getType(p.symbol)===filterType)
        .sort((a,b)=>{
          if(sortBy==="market_value") return parseFloat(b.market_value)-parseFloat(a.market_value);
          if(sortBy==="pnl") return parseFloat(b.unrealized_pl)-parseFloat(a.unrealized_pl);
          if(sortBy==="yield") return getYield(b.symbol)-getYield(a.symbol);
          if(sortBy==="symbol") return a.symbol.localeCompare(b.symbol);
          return 0;
        });

      const S={
        app:{display:"flex",height:"100vh",background:"#0d0f14",color:"white",overflow:"hidden"},
        sidebar:{width:200,flexShrink:0,background:"#111318",borderRight:"1px solid rgba(255,255,255,0.07)",padding:"24px 16px",display:"flex",flexDirection:"column",height:"100vh",overflowY:"auto"},
        logo:{fontSize:16,fontWeight:700,letterSpacing:"-0.02em"},
        navItem:{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:13,color:"rgba(255,255,255,0.45)",marginBottom:2},
        navActive:{background:"rgba(255,255,255,0.08)",color:"white"},
        main:{flex:1,overflowY:"auto"},
        page:{padding:"28px"},
        ph:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24},
        h1:{fontSize:22,fontWeight:700,margin:0,letterSpacing:"-0.03em"},
        card:{background:"#111318",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"18px 20px"},
        ct:{fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",color:"rgba(255,255,255,0.3)",marginBottom:14},
        kpi:{background:"#111318",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"16px 18px"},
        kl:{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:6},
        kv:{fontSize:22,fontWeight:700,letterSpacing:"-0.03em",lineHeight:1},
        ks:{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:4},
        input:{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"10px 14px",color:"white",fontSize:13,outline:"none",boxSizing:"border-box"},
        btnP:{width:"100%",background:"white",color:"#0d0f14",border:"none",borderRadius:8,padding:"11px 0",fontSize:13,fontWeight:600,cursor:"pointer"},
        btnG:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"7px 12px",color:"rgba(255,255,255,0.55)",fontSize:12,cursor:"pointer"},
        sel:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"7px 12px",color:"white",fontSize:12,cursor:"pointer"},
        err:{background:"rgba(248,113,113,0.1)",border:"1px solid rgba(248,113,113,0.3)",borderRadius:8,padding:"10px 14px",fontSize:12,color:"#f87171",marginBottom:16},
      };

      // ── LOGIN ──
      if (!connected&&!loading) return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",background:"#0d0f14"}}>
          <div style={{background:"#111318",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:"32px 28px",width:360}}>
            <div style={{marginBottom:24}}>
              <div style={S.logo}>◈ Portfolio Tracker</div>
              <div style={{color:"rgba(255,255,255,0.35)",fontSize:13,marginTop:6}}>Conecta tu cuenta Alpaca Live</div>
            </div>
            {error&&<div style={S.err}>{error}</div>}
            <input style={S.input} placeholder="API Key (PKXXXXXXXX...)" value={inputKey} onChange={e=>setInputKey(e.target.value)} />
            <input style={{...S.input,marginTop:10}} type="password" placeholder="API Secret" value={inputSecret} onChange={e=>setInputSecret(e.target.value)} />
            <div style={{fontSize:11,color:"rgba(255,255,255,0.25)",margin:"10px 0 18px",lineHeight:1.6}}>
              Tus credenciales se guardan en localStorage de este navegador y solo se usan para llamar directamente a la API de Alpaca.
            </div>
            <button style={S.btnP} onClick={connect} disabled={!inputKey||!inputSecret}>
              Conectar cuenta →
            </button>
          </div>
        </div>
      );

      return (
        <div style={S.app}>
          {/* ── Sidebar ── */}
          <div style={S.sidebar}>
            <div style={S.logo}>◈ Portfolio</div>
            <div style={{marginTop:32,flex:1}}>
              {NAV_ITEMS.map(n=>(
                <div key={n.id} style={{...S.navItem,...(activeNav===n.id?S.navActive:{})}} onClick={()=>setActiveNav(n.id)}>
                  <span style={{fontSize:13,opacity:0.65}}>{n.icon}</span>
                  <span>{n.label}</span>
                </div>
              ))}
            </div>
            <div style={{borderTop:"1px solid rgba(255,255,255,0.07)",paddingTop:16}}>
              {account?.account_number&&<div style={{fontSize:11,color:"rgba(255,255,255,0.22)",marginBottom:3}}>#{account.account_number.slice(-8)}</div>}
              {lastRefresh&&<div style={{fontSize:10,color:"rgba(255,255,255,0.18)",marginBottom:10}}>Act. {lastRefresh.toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}</div>}
              <button style={{...S.btnG,width:"100%",fontSize:11,marginBottom:6}} onClick={loadData} disabled={loading}>{loading?"Cargando...":"↺ Actualizar"}</button>
              <button style={{...S.btnG,width:"100%",fontSize:11,color:"rgba(255,100,100,0.55)"}} onClick={()=>{localStorage.removeItem("alpaca_creds");setCreds({});setConnected(false);setAccount(null);setPositions([]);}}>Desconectar</button>
            </div>
          </div>

          {/* ── Main ── */}
          <div style={S.main}>
            {loading&&!account&&<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"rgba(255,255,255,0.25)",fontSize:14}}>Conectando con Alpaca...</div>}
            {error&&account&&<div style={{...S.err,margin:24}}>{error}</div>}

            {account&&<>

              {/* ── DASHBOARD ── */}
              {activeNav==="dashboard"&&(
                <div style={S.page}>
                  <div style={S.ph}>
                    <h1 style={S.h1}>Dashboard</h1>
                    <div style={{fontSize:12,color:"rgba(255,255,255,0.25)"}}>Alpaca Live · {account.currency||"USD"}</div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
                    {[
                      {l:"Cartera total",v:fmtK(pv),s:"market value",c:"white"},
                      {l:"Equity neto",v:fmtK(eq),s:`Buying power: ${fmtK(bp)}`,c:"white"},
                      {l:"P&L total",v:fmtK(totalPL),s:fmtPct(pv>0?totalPL/pv*100:0),c:totalPL>=0?"#4ade80":"#f87171"},
                      {l:"Yield anual est.",v:portYield.toFixed(1)+"%",s:fmt(totalDivYear,0)+"/año",c:"#60a5fa"},
                    ].map((k,i)=>(
                      <div key={i} style={S.kpi}>
                        <div style={S.kl}>{k.l}</div>
                        <div style={{...S.kv,color:k.c}}>{k.v}</div>
                        <div style={S.ks}>{k.s}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                    <div style={S.card}>
                      <div style={S.ct}>LTV — Loan to Value</div>
                      <div style={{display:"flex",alignItems:"center",gap:16}}>
                        <div style={{flex:"0 0 130px"}}><LTVGauge ltv={ltv}/></div>
                        <div style={{flex:1}}>
                          <div style={{marginBottom:10}}>
                            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:2}}>Margen usado</div>
                            <div style={{fontSize:16,fontWeight:600,color:ltvColor}}>{fmtK(marginUsed)}</div>
                          </div>
                          <div style={{marginBottom:10}}>
                            <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:2}}>Caída máx. antes margin call</div>
                            <div style={{fontSize:16,fontWeight:600}}>{mcDrop>0?`-${mcDrop.toFixed(1)}%`:"N/A"}</div>
                          </div>
                          <div style={{padding:"8px 12px",borderRadius:8,background:ltv<40?"rgba(74,222,128,0.1)":ltv<60?"rgba(251,191,36,0.1)":"rgba(248,113,113,0.1)",border:`1px solid ${ltvColor}33`,fontSize:11,color:ltvColor}}>
                            {ltv<40?"✓ Zona segura":ltv<60?"⚠ Monitorea el margen":"✗ Riesgo de margin call"}
                          </div>
                        </div>
                      </div>
                    </div>
                    <div style={S.card}>
                      <div style={S.ct}>Dividendos estimados</div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                        {[
                          {l:"Esta semana",v:fmt(positions.filter(p=>getType(p.symbol)==="weekly").reduce((s,p)=>s+parseFloat(p.market_value)*getYield(p.symbol)/52,0),0)},
                          {l:"Este mes",v:fmt(totalDivMonth,0)},
                          {l:"Este año",v:fmt(totalDivYear,0)},
                          {l:"Yield medio",v:portYield.toFixed(1)+"%"},
                        ].map((d,i)=>(
                          <div key={i} style={{background:"rgba(255,255,255,0.04)",borderRadius:8,padding:"10px 12px"}}>
                            <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",marginBottom:3}}>{d.l}</div>
                            <div style={{fontSize:17,fontWeight:600,color:"#4ade80"}}>{d.v}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{fontSize:10,color:"rgba(255,255,255,0.2)"}}>Basado en yield TTM de cada ETF</div>
                    </div>
                  </div>
                  <div style={S.card}>
                    <div style={S.ct}>Top posiciones</div>
                    {positions.slice().sort((a,b)=>parseFloat(b.market_value)-parseFloat(a.market_value)).slice(0,6).map((p,i)=>{
                      const weight=pv>0?parseFloat(p.market_value)/pv*100:0;
                      const pnl=parseFloat(p.unrealized_pl||0);
                      return (
                        <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:i<5?"1px solid rgba(255,255,255,0.05)":"none"}}>
                          <div style={{width:34,height:34,borderRadius:7,background:"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,letterSpacing:"0.02em"}}>{p.symbol.slice(0,4)}</div>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                              <span style={{fontWeight:600,fontSize:13}}>{p.symbol}</span>
                              <span style={{fontWeight:600,fontSize:13}}>{fmtK(parseFloat(p.market_value))}</span>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:10}}>
                              <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:10,height:3,overflow:"hidden"}}>
                                <div style={{width:`${weight}%`,height:"100%",background:"rgba(96,165,250,0.5)",borderRadius:10}}/>
                              </div>
                              <span style={{fontSize:11,color:pnl>=0?"#4ade80":"#f87171",minWidth:48,textAlign:"right"}}>{fmtPct(parseFloat(p.unrealized_plpc||0)*100)}</span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* ── POSICIONES ── */}
              {activeNav==="positions"&&(
                <div style={S.page}>
                  <div style={S.ph}>
                    <h1 style={S.h1}>Posiciones</h1>
                    <div style={{display:"flex",gap:8}}>
                      <select style={S.sel} value={filterType} onChange={e=>setFilterType(e.target.value)}>
                        <option value="all">Todas</option>
                        <option value="weekly">Semanales</option>
                        <option value="monthly">Mensuales</option>
                        <option value="other">Otras</option>
                      </select>
                      <select style={S.sel} value={sortBy} onChange={e=>setSortBy(e.target.value)}>
                        <option value="market_value">Por valor</option>
                        <option value="pnl">Por P&L</option>
                        <option value="yield">Por yield</option>
                        <option value="symbol">Por ticker</option>
                      </select>
                    </div>
                  </div>
                  <div style={S.card}>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,whiteSpace:"nowrap"}}>
                        <thead>
                          <tr style={{borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                            {["Ticker","Tipo","Cant.","Precio","Valor","P&L $","P&L %","Yield","Div/mes","Peso"].map((h,i)=>(
                              <th key={i} style={{padding:"8px 10px",textAlign:i>1?"right":"left",fontWeight:500,fontSize:11,color:"rgba(255,255,255,0.35)"}}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {filteredPos.map((p,i)=>{
                            const type=getType(p.symbol);
                            const pnl=parseFloat(p.unrealized_pl||0);
                            const pnlPct=parseFloat(p.unrealized_plpc||0)*100;
                            const mv=parseFloat(p.market_value);
                            const yld=getYield(p.symbol);
                            const weight=pv>0?(mv/pv)*100:0;
                            const badgeBg=type==="weekly"?"rgba(96,165,250,0.15)":type==="monthly"?"rgba(74,222,128,0.12)":"rgba(255,255,255,0.07)";
                            const badgeC=type==="weekly"?"#60a5fa":type==="monthly"?"#4ade80":"rgba(255,255,255,0.35)";
                            return (
                              <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                                <td style={{padding:"10px 10px",fontWeight:600}}>{p.symbol}</td>
                                <td style={{padding:"10px 10px"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:badgeBg,color:badgeC}}>{type==="weekly"?"semanal":type==="monthly"?"mensual":"otro"}</span></td>
                                <td style={{padding:"10px 10px",textAlign:"right"}}>{parseFloat(p.qty).toFixed(2)}</td>
                                <td style={{padding:"10px 10px",textAlign:"right"}}>{fmt(parseFloat(p.current_price),2)}</td>
                                <td style={{padding:"10px 10px",textAlign:"right",fontWeight:500}}>{fmtK(mv)}</td>
                                <td style={{padding:"10px 10px",textAlign:"right",color:pnl>=0?"#4ade80":"#f87171"}}>{fmtK(pnl)}</td>
                                <td style={{padding:"10px 10px",textAlign:"right",color:pnlPct>=0?"#4ade80":"#f87171"}}>{fmtPct(pnlPct)}</td>
                                <td style={{padding:"10px 10px",textAlign:"right",color:"#60a5fa"}}>{(yld*100).toFixed(1)}%</td>
                                <td style={{padding:"10px 10px",textAlign:"right",color:"#a3e635"}}>{fmt(mv*yld/12,0)}</td>
                                <td style={{padding:"10px 10px",textAlign:"right",color:"rgba(255,255,255,0.35)",fontSize:11}}>{weight.toFixed(1)}%</td>
                              </tr>
                            );
                          })}
                        </tbody>
                        <tfoot>
                          <tr style={{borderTop:"1px solid rgba(255,255,255,0.12)"}}>
                            <td colSpan={4} style={{padding:"10px 10px",fontSize:11,color:"rgba(255,255,255,0.4)",fontWeight:600}}>TOTAL ({filteredPos.length})</td>
                            <td style={{padding:"10px 10px",textAlign:"right",fontWeight:600}}>{fmtK(filteredPos.reduce((s,p)=>s+parseFloat(p.market_value),0))}</td>
                            <td style={{padding:"10px 10px",textAlign:"right",fontWeight:600,color:totalPL>=0?"#4ade80":"#f87171"}}>{fmtK(filteredPos.reduce((s,p)=>s+parseFloat(p.unrealized_pl||0),0))}</td>
                            <td colSpan={2}/>
                            <td style={{padding:"10px 10px",textAlign:"right",fontWeight:600,color:"#a3e635"}}>{fmt(filteredPos.reduce((s,p)=>s+parseFloat(p.market_value)*getYield(p.symbol)/12,0),0)}</td>
                            <td/>
                          </tr>
                        </tfoot>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* ── LTV ── */}
              {activeNav==="ltv"&&(
                <div style={S.page}>
                  <div style={S.ph}><h1 style={S.h1}>LTV & Margen</h1></div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
                    <div style={S.card}>
                      <div style={S.ct}>Gauge LTV</div>
                      <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"8px 0"}}>
                        <div style={{width:180}}><LTVGauge ltv={ltv}/></div>
                        <div style={{width:"100%",marginTop:16}}>
                          {[{l:"< 40%",d:"Zona segura",c:"#4ade80"},{l:"40–60%",d:"Atención",c:"#fbbf24"},{l:"> 60%",d:"Riesgo margin call",c:"#f87171"}].map((z,i)=>(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:i<2?"1px solid rgba(255,255,255,0.05)":"none"}}>
                              <div style={{width:10,height:10,borderRadius:2,background:z.c,flexShrink:0}}/>
                              <span style={{fontWeight:600,fontSize:12}}>{z.l}</span>
                              <span style={{fontSize:12,color:"rgba(255,255,255,0.4)"}}>{z.d}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                    <div style={S.card}>
                      <div style={S.ct}>Métricas de margen</div>
                      {[
                        {l:"Portfolio total",v:fmt(pv,0)},
                        {l:"Equity propio",v:fmt(eq,0)},
                        {l:"Margen usado",v:fmt(marginUsed,0),c:ltvColor},
                        {l:"LTV actual",v:ltv.toFixed(2)+"%",c:ltvColor},
                        {l:"Buying power",v:fmt(bp,0)},
                        {l:"Caída máx. antes margin call",v:mcDrop>0?`-${mcDrop.toFixed(2)}%`:"N/A",c:"#fbbf24"},
                      ].map((r,i)=>(
                        <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:i<5?"1px solid rgba(255,255,255,0.05)":"none"}}>
                          <span style={{fontSize:13,color:"rgba(255,255,255,0.45)"}}>{r.l}</span>
                          <span style={{fontSize:13,fontWeight:600,color:r.c||"white"}}>{r.v}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div style={S.card}>
                    <div style={S.ct}>Simulador de caída de mercado</div>
                    <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:16}}>Impacto en LTV y equity según distintos escenarios de caída</div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,whiteSpace:"nowrap"}}>
                        <thead>
                          <tr style={{borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                            {["Caída","Nuevo valor","Equity restante","LTV resultante","Estado"].map((h,i)=>(
                              <th key={i} style={{padding:"8px 10px",textAlign:i>0?"right":"left",fontWeight:500,color:"rgba(255,255,255,0.35)"}}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {[-5,-10,-15,-20,-25,-30,-40,-50].map(drop=>{
                            const newPV=pv*(1+drop/100);
                            const newEq=newPV-marginUsed;
                            const newLtv=newPV>0?(marginUsed/newPV)*100:100;
                            const st=newLtv<40?{t:"Seguro",c:"#4ade80"}:newLtv<60?{t:"Atención",c:"#fbbf24"}:newEq<0?{t:"Liquidado",c:"#f87171"}:{t:"Margin call",c:"#f87171"};
                            return (
                              <tr key={drop} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                                <td style={{padding:"8px 10px",fontWeight:600}}>{drop}%</td>
                                <td style={{padding:"8px 10px",textAlign:"right"}}>{fmt(newPV,0)}</td>
                                <td style={{padding:"8px 10px",textAlign:"right",color:newEq<0?"#f87171":"white"}}>{fmt(newEq,0)}</td>
                                <td style={{padding:"8px 10px",textAlign:"right",color:st.c}}>{newLtv.toFixed(1)}%</td>
                                <td style={{padding:"8px 10px",textAlign:"right"}}><span style={{fontSize:10,padding:"2px 8px",borderRadius:4,background:`${st.c}18`,color:st.c}}>{st.t}</span></td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* ── DIVIDENDOS ── */}
              {activeNav==="dividends"&&(
                <div style={S.page}>
                  <div style={S.ph}><h1 style={S.h1}>Dividendos</h1></div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1.1fr",gap:12}}>
                    <div>
                      <div style={{...S.card,marginBottom:12}}>
                        <div style={S.ct}>Resumen</div>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
                          {[
                            {l:"Esta semana",v:fmt(positions.filter(p=>getType(p.symbol)==="weekly").reduce((s,p)=>s+parseFloat(p.market_value)*getYield(p.symbol)/52,0),0)},
                            {l:"Este mes",v:fmt(totalDivMonth,0)},
                            {l:"Este año",v:fmt(totalDivYear,0)},
                            {l:"Yield medio",v:portYield.toFixed(2)+"%"},
                          ].map((d,i)=>(
                            <div key={i} style={{background:"rgba(74,222,128,0.07)",border:"1px solid rgba(74,222,128,0.12)",borderRadius:10,padding:"12px 14px"}}>
                              <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",marginBottom:3}}>{d.l}</div>
                              <div style={{fontSize:18,fontWeight:700,color:"#4ade80"}}>{d.v}</div>
                            </div>
                          ))}
                        </div>
                      </div>
                      <div style={S.card}>
                        <div style={S.ct}>Por posición</div>
                        {positions.slice().sort((a,b)=>parseFloat(b.market_value)*getYield(b.symbol)-parseFloat(a.market_value)*getYield(a.symbol)).map((p,i)=>{
                          const yld=getYield(p.symbol), mv=parseFloat(p.market_value);
                          const monthly=mv*yld/12, share=totalDivMonth>0?monthly/totalDivMonth*100:0;
                          const type=getType(p.symbol);
                          return (
                            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                              <span style={{fontSize:9,padding:"2px 6px",borderRadius:3,background:type==="weekly"?"rgba(96,165,250,0.15)":"rgba(74,222,128,0.12)",color:type==="weekly"?"#60a5fa":"#4ade80",width:48,textAlign:"center",flexShrink:0}}>{type==="weekly"?"sem":"men"}</span>
                              <span style={{fontWeight:600,width:50,fontSize:12,flexShrink:0}}>{p.symbol}</span>
                              <div style={{flex:1,background:"rgba(255,255,255,0.06)",borderRadius:3,height:3,overflow:"hidden"}}>
                                <div style={{width:`${share}%`,height:"100%",background:"rgba(74,222,128,0.55)"}}/>
                              </div>
                              <span style={{fontSize:12,fontWeight:500,color:"#4ade80",minWidth:58,textAlign:"right"}}>{fmt(monthly,0)}/mes</span>
                              <span style={{fontSize:11,color:"rgba(255,255,255,0.25)",minWidth:30,textAlign:"right"}}>{(yld*100).toFixed(0)}%</span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                    <div style={S.card}>
                      <div style={S.ct}>Calendario</div>
                      <DividendCalendar positions={positions}/>
                    </div>
                  </div>
                </div>
              )}

              {/* ── EVOLUCIÓN ── */}
              {activeNav==="chart"&&(
                <div style={S.page}>
                  <div style={S.ph}><h1 style={S.h1}>Evolución de cartera</h1></div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
                    {histData.length>0&&(()=>{
                      const first=histData[0], last=histData[histData.length-1];
                      const change=last-first, chPct=first>0?change/first*100:0;
                      return [
                        {l:"Inicio periodo",v:fmtK(first),s:histLabels[0]||""},
                        {l:"Variación 30d",v:fmtK(change),s:fmtPct(chPct),c:change>=0?"#4ade80":"#f87171"},
                        {l:"Máximo 30d",v:fmtK(Math.max(...histData)),s:"equity portfolio"},
                      ].map((k,i)=>(
                        <div key={i} style={S.kpi}>
                          <div style={S.kl}>{k.l}</div>
                          <div style={{...S.kv,color:k.c||"white"}}>{k.v}</div>
                          <div style={S.ks}>{k.s}</div>
                        </div>
                      ));
                    })()}
                  </div>
                  <div style={{...S.card,marginBottom:12}}>
                    <div style={S.ct}>Equity 30 días</div>
                    <div style={{height:280,marginTop:8}}>
                      {histData.length>1
                        ?<LineChart data={histData} labels={histLabels} color="#60a5fa"/>
                        :<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"rgba(255,255,255,0.2)",fontSize:13}}>Sin datos de historial disponibles</div>
                      }
                    </div>
                  </div>
                  <div style={S.card}>
                    <div style={S.ct}>Distribución por tipo</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
                      {[
                        {l:"ETFs semanales",poss:positions.filter(p=>getType(p.symbol)==="weekly"),c:"#60a5fa"},
                        {l:"ETFs mensuales",poss:positions.filter(p=>getType(p.symbol)==="monthly"),c:"#4ade80"},
                      ].map((g,i)=>{
                        const total=g.poss.reduce((s,p)=>s+parseFloat(p.market_value),0);
                        const pct=pv>0?total/pv*100:0;
                        return (
                          <div key={i} style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"16px 18px"}}>
                            <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:6}}>{g.l}</div>
                            <div style={{fontSize:20,fontWeight:700,marginBottom:2}}>{fmtK(total)}</div>
                            <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:10}}>{pct.toFixed(1)}% · {g.poss.length} posiciones</div>
                            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:4,height:4,overflow:"hidden"}}>
                              <div style={{width:`${pct}%`,height:"100%",background:g.c}}/>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}

            </>}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
