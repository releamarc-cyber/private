<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>◈ Portfolio Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #0d0f14; color: white; font-family: 'DM Sans', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 4px; }
    input, select, button { font-family: inherit; }
    input::placeholder { color: rgba(255,255,255,0.25); }
    #gate { position:fixed;inset:0;background:#0d0f14;display:flex;align-items:center;justify-content:center;z-index:9999; }
    #gate-card { background:#111318;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:36px 32px;width:340px; }
    #gate-logo { font-size:16px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px; }
    #gate-sub { font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:28px; }
    #gate-input { width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:11px 14px;color:white;font-size:14px;outline:none;font-family:inherit;letter-spacing:0.1em;margin-bottom:12px; }
    #gate-input:focus { border-color:rgba(255,255,255,0.3); }
    #gate-btn { width:100%;background:white;color:#0d0f14;border:none;border-radius:8px;padding:12px 0;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit; }
    #gate-btn:hover { opacity:0.88; }
    #gate-err { font-size:12px;color:#f87171;margin-top:10px;min-height:18px;text-align:center; }
    #gate-hint { font-size:11px;color:rgba(255,255,255,0.2);margin-top:20px;text-align:center;line-height:1.6; }
    #gate.hidden { display:none; }
  </style>
  <script>
    // ─── CAMBIA ESTA CONTRASEÑA ───────────────────
    const SITE_PASSWORD = "mipassword123";
    // ─────────────────────────────────────────────
    async function sha256(msg) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(msg));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }
    let correctHash = "";
    async function init() {
      correctHash = await sha256(SITE_PASSWORD);
      if (sessionStorage.getItem("pt_auth") === correctHash) unlock();
    }
    function unlock() { document.getElementById("gate").classList.add("hidden"); }
    async function tryPassword() {
      const val = document.getElementById("gate-input").value;
      const h = await sha256(val);
      if (h === correctHash) { sessionStorage.setItem("pt_auth", h); unlock(); }
      else {
        document.getElementById("gate-err").textContent = "Contraseña incorrecta";
        document.getElementById("gate-input").value = "";
        document.getElementById("gate-input").focus();
        setTimeout(()=>{ document.getElementById("gate-err").textContent=""; }, 2500);
      }
    }
    window.addEventListener("DOMContentLoaded", init);
  </script>
</head>
<body>
  <div id="gate">
    <div id="gate-card">
      <div id="gate-logo">◈ Portfolio Tracker</div>
      <div id="gate-sub">Introduce la contraseña para continuar</div>
      <input id="gate-input" type="password" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter') tryPassword()" />
      <button id="gate-btn" onclick="tryPassword()">Acceder →</button>
      <div id="gate-err"></div>
      <div id="gate-hint">La sesión se mantiene mientras el navegador esté abierto.</div>
    </div>
  </div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    const BASE = "https://api.alpaca.markets";
    const WEEKLY = new Set(["QDTE","XDTE","RDTE","SPDT","IWMY","FEPI","BALI","QQQI","SPYI"]);
    const MONTHLY = new Set(["JEPI","JEPQ","XYLD","QYLD","RYLD","DIVO","GPIQ","SVOL","KLIP","YMAX","YMAG","CONY","MSFO","NVDY","TSLY","AMZY","GOOGY","NFLY","APLY"]);
    const NAV = [
      {id:"dashboard",label:"Dashboard",icon:"◈"},
      {id:"positions",label:"Posiciones",icon:"⊞"},
      {id:"ltv",label:"LTV & Margen",icon:"⊿"},
      {id:"dividends",label:"Dividendos",icon:"◎"},
      {id:"chart",label:"Evolución",icon:"↗"},
    ];

    const fmt = (v,dec=2) => { if(v==null||isNaN(v))return"—"; const n=Number(v); return(n<0?"-$":"$")+Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:dec,maximumFractionDigits:dec}); };
    const fmtPct = (v,dec=2) => { if(v==null||isNaN(v))return"—"; return(v>=0?"+":"")+Number(v).toFixed(dec)+"%"; };
    const fmtK = (v) => { if(v==null||isNaN(v))return"—"; const n=Number(v); if(Math.abs(n)>=1e6)return(n<0?"-$":"$")+(Math.abs(n)/1e6).toFixed(2)+"M"; if(Math.abs(n)>=1e3)return(n<0?"-$":"$")+(Math.abs(n)/1e3).toFixed(1)+"K"; return fmt(v,0); };
    const getType = (sym) => { if(WEEKLY.has(sym?.toUpperCase()))return"weekly"; if(MONTHLY.has(sym?.toUpperCase()))return"monthly"; return"other"; };

    function LTVGauge({ ltv }) {
      const cl=Math.min(Math.max(ltv,0),100);
      const color=ltv<40?"#4ade80":ltv<60?"#fbbf24":"#f87171";
      const cx=80,cy=80,r=60;
      const xy=(deg)=>{ const rd=deg*Math.PI/180; return{x:cx+r*Math.cos(rd),y:cy+r*Math.sin(rd)}; };
      const arc=(s,e,c)=>{ const sp=xy(s),ep=xy(e),lg=Math.abs(e-s)>180?1:0; return <path d={`M ${sp.x} ${sp.y} A ${r} ${r} 0 ${lg} 1 ${ep.x} ${ep.y}`} fill="none" stroke={c} strokeWidth="10" strokeLinecap="round"/>; };
      const nd=xy(-135+(cl/100)*270);
      return(
        <svg viewBox="0 0 160 110" style={{width:"100%",maxWidth:200}}>
          {arc(-135,-9,"rgba(255,255,255,0.08)")}
          {arc(-135,-135+(cl/100)*270,color)}
          <line x1={cx} y1={cy} x2={nd.x} y2={nd.y} stroke={color} strokeWidth="2.5" strokeLinecap="round"/>
          <circle cx={cx} cy={cy} r="5" fill={color}/>
          <text x={cx} y={cy+28} textAnchor="middle" fill="white" fontSize="18" fontWeight="600">{cl.toFixed(1)}%</text>
          <text x={cx} y={cy+42} textAnchor="middle" fill="rgba(255,255,255,0.4)" fontSize="9">LTV</text>
          <text x={20} y={105} fill="rgba(255,255,255,0.3)" fontSize="8">0%</text>
          <text x={128} y={105} fill="rgba(255,255,255,0.3)" fontSize="8">100%</text>
        </svg>
      );
    }

    function LineChart({ data, labels, color="#60a5fa" }) {
      const ref=useRef(null);
      useEffect(()=>{
        if(!data?.length||!ref.current)return;
        const cv=ref.current,ctx=cv.getContext("2d");
        const dpr=window.devicePixelRatio||1,w=cv.offsetWidth,h=cv.offsetHeight;
        cv.width=w*dpr; cv.height=h*dpr; ctx.scale(dpr,dpr);
        ctx.clearRect(0,0,w,h);
        const p={t:20,r:20,b:40,l:72},cw=w-p.l-p.r,ch=h-p.t-p.b;
        const mn=Math.min(...data)*0.995,mx=Math.max(...data)*1.005;
        const xS=(i)=>p.l+(i/(data.length-1))*cw,yS=(v)=>p.t+ch-((v-mn)/(mx-mn))*ch;
        ctx.strokeStyle="rgba(255,255,255,0.05)"; ctx.lineWidth=1;
        for(let i=0;i<=4;i++){
          const y=p.t+(ch/4)*i; ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(p.l+cw,y); ctx.stroke();
          ctx.fillStyle="rgba(255,255,255,0.35)"; ctx.font="11px system-ui"; ctx.textAlign="right";
          ctx.fillText(fmtK(mx-((mx-mn)/4)*i),p.l-8,y+4);
        }
        const g=ctx.createLinearGradient(0,p.t,0,p.t+ch);
        g.addColorStop(0,color+"33"); g.addColorStop(1,color+"00");
        ctx.beginPath(); ctx.moveTo(xS(0),yS(data[0]));
        data.forEach((v,i)=>ctx.lineTo(xS(i),yS(v)));
        ctx.lineTo(xS(data.length-1),p.t+ch); ctx.lineTo(xS(0),p.t+ch);
        ctx.closePath(); ctx.fillStyle=g; ctx.fill();
        ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2; ctx.lineJoin="round";
        data.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v))); ctx.stroke();
        ctx.fillStyle="rgba(255,255,255,0.35)"; ctx.font="10px system-ui"; ctx.textAlign="center";
        const step=Math.ceil(labels.length/8);
        labels.forEach((l,i)=>{ if(i%step===0)ctx.fillText(l,xS(i),h-12); });
      },[data,labels,color]);
      return <canvas ref={ref} style={{width:"100%",height:"100%",display:"block"}}/>;
    }

    function DividendCalendar({ positions, upcoming }) {
      const today=new Date();
      const [vm,setVm]=useState(today.getMonth());
      const [vy,setVy]=useState(today.getFullYear());
      const events={};
      // Fechas reales de corporate actions
      upcoming.forEach(ann=>{
        const exDate=ann.ex_dividend_date||ann.payable_date; if(!exDate)return;
        const d=new Date(exDate);
        if(d.getMonth()===vm&&d.getFullYear()===vy){
          const key=d.getDate(); if(!events[key])events[key]=[];
          events[key].push({sym:ann.symbol,type:getType(ann.symbol),isReal:true});
        }
      });
      // Patrón para posiciones sin anuncio real
      const covered=new Set(upcoming.map(a=>a.symbol?.toUpperCase()));
      positions.forEach(p=>{
        const sym=p.symbol.toUpperCase(); if(covered.has(sym))return;
        const t=getType(sym);
        if(t==="weekly"){
          const d=new Date(vy,vm,1);
          while(d.getMonth()===vm){ if(d.getDay()===5){ const k=d.getDate(); if(!events[k])events[k]=[]; events[k].push({sym:p.symbol,type:"weekly",isReal:false}); } d.setDate(d.getDate()+1); }
        } else if(t==="monthly"){ const k=5; if(!events[k])events[k]=[]; events[k].push({sym:p.symbol,type:"monthly",isReal:false}); }
      });
      const firstDay=new Date(vy,vm,1).getDay(),dim=new Date(vy,vm+1,0).getDate();
      const monthName=new Date(vy,vm).toLocaleString("es-ES",{month:"long",year:"numeric"});
      const cells=[]; for(let i=0;i<firstDay;i++)cells.push(null); for(let i=1;i<=dim;i++)cells.push(i);
      const prev=()=>vm===0?(setVm(11),setVy(y=>y-1)):setVm(m=>m-1);
      const next=()=>vm===11?(setVm(0),setVy(y=>y+1)):setVm(m=>m+1);
      const bS={background:"rgba(255,255,255,0.07)",border:"none",color:"white",borderRadius:6,padding:"4px 14px",cursor:"pointer",fontSize:18};
      return(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <button onClick={prev} style={bS}>‹</button>
            <span style={{fontWeight:600,fontSize:14,textTransform:"capitalize"}}>{monthName}</span>
            <button onClick={next} style={bS}>›</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>
            {["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"].map(d=><div key={d} style={{textAlign:"center",fontSize:9,color:"rgba(255,255,255,0.3)",padding:"3px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {cells.map((day,i)=>{
              if(!day)return<div key={i}/>;
              const evs=events[day]||[];
              const isToday=day===today.getDate()&&vm===today.getMonth()&&vy===today.getFullYear();
              return(
                <div key={i} style={{minHeight:50,borderRadius:5,padding:"3px 4px",background:isToday?"rgba(96,165,250,0.15)":evs.length?"rgba(74,222,128,0.07)":"rgba(255,255,255,0.03)",border:isToday?"1px solid rgba(96,165,250,0.4)":"1px solid transparent"}}>
                  <div style={{fontSize:10,color:isToday?"#60a5fa":"rgba(255,255,255,0.5)",fontWeight:isToday?600:400}}>{day}</div>
                  {evs.length>0&&<div style={{marginTop:1}}>
                    {evs.slice(0,2).map((e,j)=><div key={j} style={{fontSize:8,color:e.type==="weekly"?"#60a5fa":"#4ade80",lineHeight:1.4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.sym}{e.isReal?" ✓":""}</div>)}
                    {evs.length>2&&<div style={{fontSize:8,color:"rgba(255,255,255,0.3)"}}>+{evs.length-2}</div>}
                  </div>}
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"rgba(255,255,255,0.4)"}}><div style={{width:7,height:7,borderRadius:2,background:"#60a5fa"}}/> Semanal</div>
            <div style={{display:"flex",alignItems:"center",gap:5,fontSize:10,color:"rgba(255,255,255,0.4)"}}><div style={{width:7,height:7,borderRadius:2,background:"#4ade80"}}/> Mensual</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>✓ confirmado por Alpaca</div>
          </div>
        </div>
      );
    }

    function App() {
      const [creds,setCreds]=useState(()=>{ try{return JSON.parse(localStorage.getItem("alpaca_creds")||"{}");}catch{return{};} });
      const [inputKey,setInputKey]=useState(creds.key||"");
      const [inputSecret,setInputSecret]=useState(creds.secret||"");
      const [connected,setConnected]=useState(false);
      const [loading,setLoading]=useState(false);
      const [error,setError]=useState(null);
      const [account,setAccount]=useState(null);
      const [positions,setPositions]=useState([]);
      const [history,setHistory]=useState(null);
      const [divHistory,setDivHistory]=useState([]);
      const [divMap,setDivMap]=useState({});
      const [upcoming,setUpcoming]=useState([]);
      const [activeNav,setActiveNav]=useState("dashboard");
      const [sortBy,setSortBy]=useState("market_value");
      const [filterType,setFilterType]=useState("all");
      const [lastRefresh,setLastRefresh]=useState(null);

      const apiFetch=useCallback(async(path)=>{
        const res=await fetch(`${BASE}${path}`,{headers:{"APCA-API-KEY-ID":creds.key,"APCA-API-SECRET-KEY":creds.secret}});
        if(!res.ok)throw new Error(`${res.status} — ${res.statusText}`);
        return res.json();
      },[creds]);

      const loadData=useCallback(async()=>{
        if(!creds.key||!creds.secret)return;
        setLoading(true); setError(null);
        try {
          const [acc,pos,hist]=await Promise.all([
            apiFetch("/v2/account"),
            apiFetch("/v2/positions"),
            apiFetch("/v2/account/portfolio/history?period=1M&timeframe=1D"),
          ]);
          if(acc.code)throw new Error(acc.message||"Error de autenticación");
          setAccount(acc);
          const posArr=Array.isArray(pos)?pos:[];
          setPositions(posArr);
          setHistory(hist);

          // Dividendos reales cobrados últimos 12 meses
          // GET /v2/account/activities?activity_type=DIV
          // Respuesta: [{id, activity_type, date, symbol, qty, per_share_amount, net_amount, ...}]
          const after12=new Date(); after12.setFullYear(after12.getFullYear()-1);
          let divActs=[];
          try {
            const r=await apiFetch(`/v2/account/activities?activity_type=DIV&after=${after12.toISOString().split("T")[0]}&page_size=500`);
            divActs=Array.isArray(r)?r:[];
          } catch(_){}
          setDivHistory(divActs);
          // Acumula por símbolo. net_amount es el total del pago.
          // Si no viene net_amount se usa per_share_amount * qty
          const map={};
          divActs.forEach(d=>{
            const sym=d.symbol?.toUpperCase(); if(!sym)return;
            const amt=parseFloat(d.net_amount||0)||Math.abs(parseFloat(d.per_share_amount||0))*parseFloat(d.qty||1);
            map[sym]=(map[sym]||0)+amt;
          });
          setDivMap(map);

          // Próximos dividendos (corporate actions)
          // GET /v2/corporate_actions/announcements?ca_types=dividend&since=...&until=...
          if(posArr.length>0){
            const syms=posArr.map(p=>p.symbol).join(",");
            const t0=new Date().toISOString().split("T")[0];
            const t1=new Date(); t1.setDate(t1.getDate()+90);
            try {
              const r=await apiFetch(`/v2/corporate_actions/announcements?ca_types=dividend&since=${t0}&until=${t1.toISOString().split("T")[0]}&symbol=${syms}`);
              setUpcoming(Array.isArray(r)?r:[]);
            } catch(_){ setUpcoming([]); }
          }
          setConnected(true);
          setLastRefresh(new Date());
        } catch(e){ setError(e.message); } finally { setLoading(false); }
      },[apiFetch,creds]);

      useEffect(()=>{ if(creds.key&&creds.secret)loadData(); },[]);
      const connect=()=>{ const c={key:inputKey.trim(),secret:inputSecret.trim()}; setCreds(c); localStorage.setItem("alpaca_creds",JSON.stringify(c)); };
      useEffect(()=>{ if(creds.key&&creds.secret)loadData(); },[creds]);

      // ── LTV CORRECTO ──────────────────────────────────────────────────────
      // Alpaca con margen: cash es NEGATIVO cuando tienes deuda con el broker.
      // equity = cash + long_market_value  (fórmula oficial de Alpaca)
      // margen_usado = abs(cash)  si cash < 0
      // LTV = margen_usado / long_market_value
      const cash=parseFloat(account?.cash||0);
      const longMV=parseFloat(account?.long_market_value||0);
      const eq=parseFloat(account?.equity||0);
      const bp=parseFloat(account?.buying_power||0);
      const marginUsed=cash<0?Math.abs(cash):0;
      const ltv=longMV>0?(marginUsed/longMV)*100:0;
      const maintMargin=parseFloat(account?.maintenance_margin||0)||(longMV*0.30);
      // caída máx = (equity - maintenance_margin) / long_market_value
      const mcDropPct=longMV>0?((eq-maintMargin)/longMV)*100:0;
      const ltvColor=ltv<40?"#4ade80":ltv<60?"#fbbf24":"#f87171";

      // ── DIVIDENDOS REALES ─────────────────────────────────────────────────
      // Basados 100% en el historial de /v2/account/activities?activity_type=DIV
      const hasDivData=Object.keys(divMap).length>0;
      const divByPos=positions.map(p=>{
        const sym=p.symbol.toUpperCase();
        const mv=parseFloat(p.market_value);
        const annual=divMap[sym]||0;
        return {...p, annual, yieldTTM:mv>0&&annual>0?annual/mv:0, divMonth:annual/12};
      });
      const totalDivYear=divByPos.reduce((s,p)=>s+p.annual,0);
      const totalDivMonth=totalDivYear/12;
      const weeklyDivWeek=divByPos.filter(p=>getType(p.symbol)==="weekly").reduce((s,p)=>s+p.annual/52,0);
      const portYield=eq>0&&totalDivYear>0?(totalDivYear/eq)*100:0;
      const totalPL=positions.reduce((s,p)=>s+parseFloat(p.unrealized_pl||0),0);

      const histLabels=history?.timestamp?.map(t=>new Date(t*1000).toLocaleDateString("es-ES",{day:"2-digit",month:"short"}))||[];
      const histData=history?.equity?.map(v=>parseFloat(v))||[];
      const filteredPos=divByPos
        .filter(p=>filterType==="all"||getType(p.symbol)===filterType)
        .sort((a,b)=>{
          if(sortBy==="market_value")return parseFloat(b.market_value)-parseFloat(a.market_value);
          if(sortBy==="pnl")return parseFloat(b.unrealized_pl)-parseFloat(a.unrealized_pl);
          if(sortBy==="yield")return b.yieldTTM-a.yieldTTM;
          if(sortBy==="symbol")return a.symbol.localeCompare(b.symbol);
          return 0;
        });

      const S={
        app:{display:"flex",height:"100vh",background:"#0d0f14",color:"white",overflow:"hidden"},
        sidebar:{width:200,flexShrink:0,background:"#111318",borderRight:"1px solid rgba(255,255,255,0.07)",padding:"24px 16px",display:"flex",flexDirection:"column",height:"100vh",overflowY:"auto"},
        logo:{fontSize:16,fontWeight:700,letterSpacing:"-0.02em"},
        navItem:{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,cursor:"pointer",fontSize:13,color:"rgba(255,255,255,0.45)",marginBottom:2},
        navActive:{background:"rgba(255,255,255,0.08)",color:"white"},
        main:{flex:1,overflowY:"auto"},
        page:{padding:"28px"},
        ph:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24},
        h1:{fontSize:22,fontWeight:700,margin:0,letterSpacing:"-0.03em"},
        card:{background:"#111318",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"18px 20px"},
        ct:{fontSize:11,fontWeight:600,letterSpacing:"0.06em",textTransform:"uppercase",color:"rgba(255,255,255,0.3)",marginBottom:14},
        kpi:{background:"#111318",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"16px 18px"},
        kl:{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:6},
        kv:{fontSize:22,fontWeight:700,letterSpacing:"-0.03em",lineHeight:1},
        ks:{fontSize:11,color:"rgba(255,255,255,0.3)",marginTop:4},
        input:{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"10px 14px",color:"white",fontSize:13,outline:"none",boxSizing:"border-box"},
        btnP:{width:"100%",background:"white",color:"#0d0f14",border:"none",borderRadius:8,padding:"11px 0",fontSize:13,fontWeight:600,cursor:"pointer"},
        btnG:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,padding:"7px 12px",color:"rgba(255,255,255,0.55)",fontSize:12,cursor:"pointer"},
        sel:{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"7px 12px",color:"white",fontSize:12,cursor:"pointer"},

                          <thead><tr style={{borderBottom:"1px solid rgba(255,255,255,0.08)"}}>
                            {["Fecha","Símbolo","Acciones","Importe total"].map((h,i)=>(
                              <th key={i} style={{padding:"7px 10px",textAlign:i>1?"right":"left",fontWeight:500,color:"rgba(255,255,255,0.35)"}}>{h}</th>
                            ))}
                          </tr></thead>
                          <tbody>
                            {divHistory.slice(0,25).map((d,i)=>(
                              <tr key={i} style={{borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                                <td style={{padding:"7px 10px",color:"rgba(255,255,255,0.5)"}}>{d.date||"—"}</td>
                                <td style={{padding:"7px 10px",fontWeight:600}}>{d.symbol}</td>
                                <td style={{padding:"7px 10px",textAlign:"right",color:"rgba(255,255,255,0.4)"}}>{d.qty||"—"}</td>
                                <td style={{padding:"7px 10px",textAlign:"right",color:"#4ade80",fontWeight:500}}>{fmt(parseFloat(d.net_amount||0),2)}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {activeNav==="chart"&&(
                <div style={S.page}>
                  <div style={S.ph}><h1 style={S.h1}>Evolución de cartera</h1></div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
                    {histData.length>0&&(()=>{
                      const first=histData[0],last=histData[histData.length-1],chg=last-first,chgPct=first>0?chg/first*100:0;
                      return[
                        {l:"Inicio periodo",v:fmtK(first),s:histLabels[0]||""},
                        {l:"Variación 30d",v:fmtK(chg),s:fmtPct(chgPct),c:chg>=0?"#4ade80":"#f87171"},
                        {l:"Máximo 30d",v:fmtK(Math.max(...histData)),s:"portfolio equity"},
                      ].map((k,i)=>(<div key={i} style={S.kpi}><div style={S.kl}>{k.l}</div><div style={{...S.kv,color:k.c||"white"}}>{k.v}</div><div style={S.ks}>{k.s}</div></div>));
                    })()}
                  </div>
                  <div style={{...S.card,marginBottom:12}}>
                    <div style={S.ct}>Equity 30 días</div>
                    <div style={{height:280,marginTop:8}}>
                      {histData.length>1?<LineChart data={histData} labels={histLabels} color="#60a5fa"/>:<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"rgba(255,255,255,0.2)",fontSize:13}}>Sin datos de historial</div>}
                    </div>
                  </div>
                  <div style={S.card}>
                    <div style={S.ct}>Distribución por tipo</div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
                      {[
                        {l:"ETFs semanales",ps:positions.filter(p=>getType(p.symbol)==="weekly"),c:"#60a5fa"},
                        {l:"ETFs mensuales",ps:positions.filter(p=>getType(p.symbol)==="monthly"),c:"#4ade80"},
                      ].map((g,i)=>{
                        const tot=g.ps.reduce((s,p)=>s+parseFloat(p.market_value),0),pct=longMV>0?tot/longMV*100:0;
                        return(
                          <div key={i} style={{background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"16px 18px"}}>
                            <div style={{fontSize:11,color:"rgba(255,255,255,0.35)",marginBottom:6}}>{g.l}</div>
                            <div style={{fontSize:20,fontWeight:700,marginBottom:2}}>{fmtK(tot)}</div>
                            <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:10}}>{pct.toFixed(1)}% · {g.ps.length} posiciones</div>
                            <div style={{background:"rgba(255,255,255,0.07)",borderRadius:4,height:4,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:g.c}}/></div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}

            </>}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
